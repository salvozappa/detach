#cloud-config
hostname: sandbox
timezone: UTC

users:
  - name: deploy
    groups: [sudo, admin, users]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - YOUR_SSH_PUBLIC_KEY_HERE
    sudo: ALL=(ALL) NOPASSWD:ALL

  - name: detach-dev
    groups: [sudo, admin, users]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICaMfmeopNm2BiCXU5kg+bVzqmogOTZpiyNm9BM+lH3I throaway_dev_key
    sudo: ALL=(ALL) NOPASSWD:ALL

package_update: true
package_upgrade: true
packages:
  - build-essential
  - git
  - curl
  - wget
  - vim
  - htop
  - tmux
  - ufw
  - fail2ban
  - unattended-upgrades
  - python3-pip
  - python3-venv
  - python3-dev
  - docker.io
  - docker-compose
  - ca-certificates
  - apt-transport-https

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sandbox.conf
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 7200
    permissions: '0644'
    owner: root:root

runcmd:
  # Security Hardening
  - sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Docker Setup
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker deploy
  - usermod -aG docker detach-dev

  # Firewall Setup
  # Allow SSH from anywhere (needed for initial setup)
  - ufw allow OpenSSH

  # Default deny all other incoming traffic
  # Application ports (8080, 8081, 2222) are bound to localhost only
  # and are not accessible from public IP
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw --force enable

  # Development Directory Setup
  - mkdir -p /home/deploy/projects
  - chown -R deploy:deploy /home/deploy/projects
  - chmod -R 755 /home/deploy/projects

  - mkdir -p /home/detach-dev/projects
  - chown -R detach-dev:detach-dev /home/detach-dev/projects
  - chmod -R 755 /home/detach-dev/projects

  # Setup detach.it deployment directory
  - mkdir -p /home/deploy/detach/keys
  - chown -R deploy:deploy /home/deploy/detach
  - chmod -R 755 /home/deploy/detach

  # Add GitHub to known_hosts
  - sudo -u deploy ssh-keyscan github.com >> /home/deploy/.ssh/known_hosts 2>/dev/null

  # Fail2ban Setup
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable Auto-Updates
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

reboot: true