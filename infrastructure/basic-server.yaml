#cloud-config
hostname: sandbox
timezone: UTC

users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - YOUR_SSH_PUBLIC_KEY_HERE
    sudo: ALL=(ALL) NOPASSWD:ALL

package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - vim
  - htop
  - tmux
  - ufw
  - fail2ban
  - unattended-upgrades
  - docker.io
  - docker-compose
  - openssh-client
  - openssl
  - qrencode

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sandbox.conf
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 7200
    permissions: '0644'
    owner: root:root

runcmd:
  # Security Hardening
  - sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Docker Setup
  - systemctl enable docker
  - systemctl start docker

  # Firewall Setup
  - ufw allow OpenSSH
  - ufw allow 8080/tcp
  - ufw allow 8081/tcp
  - ufw --force enable

  # Fail2ban Setup
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable Auto-Updates
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

reboot: true