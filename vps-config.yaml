#cloud-config
hostname: detach
timezone: UTC

users:
  - name: detach
    groups: [sudo, docker]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFf42z1a2X8TPK1YD0LyVRY8OeeBIrG0JPl48Z+/m6Gw sal@Salvatores-MacBook-Pro.local
    sudo: ALL=(ALL) NOPASSWD:ALL

package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - vim
  - htop
  - tmux
  - ufw
  - fail2ban
  - unattended-upgrades
  - docker.io
  - docker-compose
  - ca-certificates
  - nodejs
  - npm

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sandbox.conf
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 7200
    permissions: '0644'
    owner: root:root

runcmd:
  # Security Hardening
  - sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Docker Setup
  - systemctl enable docker
  - systemctl start docker

  # Firewall Setup
  # Allow SSH from anywhere (needed for initial setup)
  - ufw allow OpenSSH

  # Default deny all other incoming traffic
  # Application ports (8080, 8081, 2222) are bound to localhost only
  # and are not accessible from public IP
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw --force enable

  # Deployment directory
  - mkdir -p /home/detach/app/keys
  - chown -R detach:detach /home/detach/app
  - chmod -R 755 /home/detach/app

  # Add GitHub to known_hosts
  - sudo -u detach ssh-keyscan github.com >> /home/detach/.ssh/known_hosts 2>/dev/null

  # Fail2ban Setup
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable Auto-Updates
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

reboot: true
