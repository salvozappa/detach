events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebSocket proxy configuration
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream for bridge WebSocket service
    upstream bridge {
        server bridge:8081;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # WebSocket proxy - dedicated path
        location /ws {
            proxy_pass http://bridge;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Service worker - always check for updates
        location = /service-worker.js {
            add_header Cache-Control "no-cache";
        }

        # Manifest - always fresh, correct MIME type
        location = /manifest.json {
            add_header Cache-Control "no-cache";
            types { application/manifest+json json; }
        }

        # Static libraries - long cache (immutable)
        location /lib/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Icons - long cache
        location /icons/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # App files - short cache with revalidation
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}
