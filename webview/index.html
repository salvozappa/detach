<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Async coding from your phone">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Detach</title>

    <!-- Vendor CSS (from npm packages) -->
    <link rel="stylesheet" href="dist/xterm.css" />
    <link rel="stylesheet" href="dist/highlight.css" />
    <link rel="stylesheet" href="dist/diff2html.css" />

    <!-- Application CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Hidden element to steal focus from terminal when needed -->
    <button id="focus-trap" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;"></button>

    <div id="status" class="connecting">Connecting...</div>

    <!-- LLM View (Terminal) -->
    <div id="view-llm" class="view active">
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- Code View -->
    <div id="view-code" class="view">
        <!-- File Explorer Panel -->
        <div id="file-explorer-panel" class="code-panel active">
            <div class="code-header">
                <span class="code-header-title" id="current-path">~/project</span>
            </div>
            <div class="file-list" id="file-list">
                <!-- Files will be loaded here -->
            </div>
        </div>

        <!-- Code Viewer Panel -->
        <div id="code-viewer-panel" class="code-panel">
            <div class="code-header">
                <button class="code-back-btn" onclick="showFileExplorer()">Back</button>
                <span class="code-header-title" id="code-filename">filename.js</span>
                <button class="code-select-toggle" id="code-select-toggle" onclick="toggleSelectMode()">Select</button>
            </div>
            <!-- Normal code view (syntax highlighted) -->
            <div class="code-content" id="code-content-normal">
                <pre><code id="code-content" class="hljs"></code></pre>
            </div>
            <!-- Diff view (diff2html) -->
            <div class="code-content" id="code-content-diff" style="display: none;"></div>
            <!-- Floating button for sending selection to LLM -->
            <button id="send-to-llm-btn" class="send-to-llm-btn">Reference to LLM</button>
        </div>
    </div>

    <!-- Git View -->
    <div id="view-git" class="view">
        <!-- Git Main Panel -->
        <div id="git-main-panel" class="code-panel active">
            <div class="git-container">
                <!-- Unstaged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header" data-section="unstaged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Unstaged Changes</span>
                        <button class="git-section-btn stage-all" id="stage-all-btn">Stage all</button>
                        <span class="git-section-count" id="unstaged-count">0</span>
                    </div>
                    <div class="git-section-content" id="unstaged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Staged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header collapsed" data-section="staged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Staged Changes</span>
                        <button class="git-section-btn unstage-all" id="unstage-all-btn">Unstage all</button>
                        <span class="git-section-count" id="staged-count">0</span>
                    </div>
                    <div class="git-section-content collapsed" id="staged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Commit Button with Message Input (Fixed at bottom) -->
                <div class="git-commit-bar">
                    <textarea id="commit-message"
                              class="commit-input"
                              placeholder="Commit message..."
                              rows="1"></textarea>
                    <button class="git-commit-btn" id="commit-btn" disabled>Commit</button>

                    <!-- Pull/Push Buttons Row -->
                    <div class="git-sync-buttons">
                        <button class="git-sync-btn" id="pull-btn">Pull</button>
                        <button class="git-sync-btn" id="push-btn">Push</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal View -->
    <div id="view-terminal" class="view">
        <div id="terminal-shell-container">
            <div id="terminal-shell"></div>
        </div>
    </div>

    <!-- Keyboard Toolbar -->
    <div id="keyboard-toolbar">
        <div class="keyboard-row">
            <button class="key-btn" data-key="tab" tabindex="-1">Tab</button>
            <button class="key-btn" data-key="mode" tabindex="-1">Mode</button>
            <button class="key-btn" data-action="pgup" tabindex="-1">PgUp</button>
            <button class="key-btn" data-action="pgdn" tabindex="-1">PgDn</button>
            <!-- <button class="key-btn" data-action="scroll-to-bottom">Scroll ↓</button> -->
        </div>
        <div class="keyboard-row">
            <button class="key-btn" data-key="esc" tabindex="-1">Esc</button>
            <button class="key-btn" data-key="ctrl-c" tabindex="-1">Ctrl+C</button>
            <button class="key-btn arrow-btn" data-key="left" tabindex="-1">←</button>
            <button class="key-btn arrow-btn" data-key="right" tabindex="-1">→</button>
            <button class="key-btn arrow-btn" data-key="up" tabindex="-1">↑</button>
            <button class="key-btn arrow-btn" data-key="down" tabindex="-1">↓</button>
            <button class="key-btn" data-key="enter" tabindex="-1">Enter</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="llm">LLM</button>
        <button class="nav-btn" data-view="code">Code</button>
        <button class="nav-btn" data-view="terminal">Terminal</button>
        <button class="nav-btn" data-view="git">Git</button>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Application JavaScript (bundled with dependencies) -->
    <script src="dist/app.js"></script>
</body>
</html>
