<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detach.it Terminal</title>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />

    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

    <!-- Application CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="status" class="connecting">Connecting...</div>

    <!-- LLM View (Terminal) -->
    <div id="view-llm" class="view active">
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- Code View -->
    <div id="view-code" class="view">
        <!-- File Explorer Panel -->
        <div id="file-explorer-panel" class="code-panel active">
            <div class="code-header">
                <span class="code-header-title" id="current-path">~/projects/sample</span>
            </div>
            <div class="file-list" id="file-list">
                <!-- Files will be loaded here -->
            </div>
        </div>

        <!-- Code Viewer Panel -->
        <div id="code-viewer-panel" class="code-panel">
            <div class="code-header">
                <button class="code-back-btn" onclick="showFileExplorer()">Back</button>
                <span class="code-header-title" id="code-filename">filename.js</span>
            </div>
            <div class="code-content">
                <pre><code id="code-content" class="hljs"></code></pre>
            </div>
        </div>
    </div>

    <!-- Git View -->
    <div id="view-git" class="view">
        <!-- Git Main Panel -->
        <div id="git-main-panel" class="code-panel active">
            <div class="git-container">
                <!-- Unstaged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header collapsed" data-section="unstaged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Unstaged Changes</span>
                        <span class="git-section-count" id="unstaged-count">0</span>
                    </div>
                    <div class="git-section-content collapsed" id="unstaged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Staged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header collapsed" data-section="staged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Staged Changes</span>
                        <span class="git-section-count" id="staged-count">0</span>
                    </div>
                    <div class="git-section-content collapsed" id="staged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Commit Button with Message Input (Fixed at bottom) -->
                <div class="git-commit-bar">
                    <textarea id="commit-message"
                              class="commit-input"
                              placeholder="Commit message..."
                              rows="1"></textarea>
                    <button class="git-commit-btn" id="commit-btn" disabled>Commit</button>

                    <!-- Pull/Push Buttons Row -->
                    <div class="git-sync-buttons">
                        <button class="git-sync-btn" id="pull-btn">Pull</button>
                        <button class="git-sync-btn" id="push-btn">Push</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal View -->
    <div id="view-terminal" class="view">
        <div id="terminal-shell-container">
            <div id="terminal-shell"></div>
        </div>
    </div>

    <!-- Keyboard Toolbar -->
    <div id="keyboard-toolbar">
        <div class="keyboard-row">
            <button class="key-btn" data-key="tab">Tab</button>
            <button class="key-btn modifier-btn" data-key="alt">Alt</button>
            <button class="key-btn" data-key="pgup">PgUp</button>
            <button class="key-btn" data-key="pgdn">PgDn</button>
            <button class="key-btn" data-key="home">Home</button>
            <button class="key-btn" data-key="end">End</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn" data-key="esc">Esc</button>
            <button class="key-btn modifier-btn" data-key="ctrl">Ctrl</button>
            <button class="key-btn" data-key="up">↑</button>
            <button class="key-btn" data-key="down">↓</button>
            <button class="key-btn" data-key="left">←</button>
            <button class="key-btn" data-key="right">→</button>
            <button class="key-btn" data-key="enter">Enter</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="llm">LLM</button>
        <button class="nav-btn" data-view="code">Code</button>
        <button class="nav-btn" data-view="terminal">Terminal</button>
        <button class="nav-btn" data-view="git">Git</button>
    </nav>

    <!-- xterm.js library -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <!-- Highlight.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Application JavaScript -->
    <script src="app.js"></script>
</body>
</html>
