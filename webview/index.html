<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detach.it Terminal</title>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />

    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #status {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px 16px;
            font-size: 12px;
            text-align: center;
            z-index: 1000;
            transition: background-color 0.3s;
        }

        #status.connecting {
            background-color: #ff9800;
            color: #000;
        }

        #status.connected {
            background-color: #4caf50;
            color: #000;
        }

        #status.disconnected {
            background-color: #f44336;
            color: #fff;
        }

        #terminal-container {
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 94px;
            padding: 8px;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        .xterm {
            height: 100%;
            padding: 8px;
        }

        .xterm-viewport {
            overflow-y: auto;
            background-color: #000;
        }

        /* Views */
        .view {
            display: none;
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 50px;
            overflow: hidden;
        }

        .view.active {
            display: block;
        }

        /* Placeholder view styling */
        .placeholder-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 16px;
            color: #888;
        }

        .placeholder-view h2 {
            color: #fff;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .placeholder-section {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #1a1a1a;
            display: flex;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:active {
            background: #222;
        }

        .nav-btn.active {
            color: #fff;
            background: #333;
        }

        /* Keyboard Toolbar */
        #keyboard-toolbar {
            position: fixed;
            bottom: 50px;
            left: 0;
            right: 0;
            height: 44px;
            background: #2a2a2a;
            display: none;
            gap: 4px;
            padding: 4px 8px;
            border-top: 1px solid #444;
            z-index: 999;
        }

        #keyboard-toolbar.visible {
            display: flex;
        }

        .key-btn {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key-btn:active {
            background: #555;
            transform: scale(0.95);
        }

        /* Code View Panels */
        .code-panel {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .code-panel.active {
            display: flex;
            flex-direction: column;
        }

        /* Code View Header */
        .code-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            gap: 12px;
        }

        .code-header-title {
            flex: 1;
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .code-back-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        /* File Explorer */
        #file-explorer-panel {
            background: #0d0d0d;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            gap: 12px;
        }

        .file-item:active {
            background: #222;
        }

        .file-icon {
            font-size: 18px;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
            color: #fff;
        }

        .file-size {
            font-size: 12px;
            color: #666;
        }

        /* Code Viewer */
        #code-viewer-panel {
            background: #0d1117;
        }

        .code-content {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .code-content pre {
            margin: 0;
            padding: 16px;
            font-size: 13px;
            line-height: 1.5;
            background: transparent !important;
        }

        .code-content code {
            background: transparent !important;
        }

        /* Git View Container */
        .git-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Git Section (Accordion) */
        .git-section {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #333;
        }

        .git-section:has(.git-section-content:not(.collapsed)) {
            flex: 1 1 auto;
            overflow: hidden;
        }

        .git-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #1a1a1a;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .git-section-header:active {
            background: #222;
        }

        .git-section-header.collapsed {
            border-bottom: 1px solid #333;
        }

        .git-section-icon {
            font-size: 12px;
            color: #888;
            transition: transform 0.2s;
        }

        .git-section-header.collapsed .git-section-icon {
            transform: rotate(-90deg);
        }

        .git-section-title {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .git-section-count {
            font-size: 12px;
            color: #888;
            background: #333;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .git-section-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .git-section-content.collapsed {
            display: none;
        }

        /* File Change Item */
        .git-file-item {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        .git-file-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .git-file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .git-file-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .git-file-stats {
            font-size: 11px;
            color: #666;
        }

        .git-file-stats .added {
            color: #4caf50;
        }

        .git-file-stats .removed {
            color: #f44336;
        }

        /* Diff Display */
        .git-diff {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            overflow-x: auto;
        }

        .git-diff-line {
            padding: 2px 8px;
            white-space: pre;
            line-height: 1.4;
        }

        .git-diff-line.hunk {
            background: #1a2332;
            color: #6699cc;
        }

        .git-diff-line.added {
            background: #0d3d1f;
            color: #4caf50;
        }

        .git-diff-line.removed {
            background: #3d0d0d;
            color: #f44336;
        }

        .git-diff-line.context {
            color: #ccc;
        }

        /* Action Buttons */
        .git-file-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .git-action-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .git-action-btn.stage {
            background: #555;
            color: #fff;
        }

        .git-action-btn.stage:active {
            background: #666;
        }

        .git-action-btn.unstage {
            background: #555;
            color: #fff;
        }

        .git-action-btn.unstage:active {
            background: #666;
        }

        .git-action-btn.discard {
            background: #c77;
            color: #fff;
        }

        .git-action-btn.discard:active {
            background: #b66;
        }

        .git-action-btn.discard.confirm {
            background: #d88;
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Commit Bar */
        .git-commit-bar {
            padding: 12px 16px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        .git-commit-btn {
            width: 100%;
            padding: 12px 24px;
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .git-commit-btn:active {
            background: #1565c0;
        }

        .git-commit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Loading State */
        .git-loading {
            padding: 24px 16px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        /* Empty State */
        .git-empty {
            padding: 24px 16px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="status" class="connecting">Connecting...</div>

    <!-- LLM View (Terminal) -->
    <div id="view-llm" class="view active">
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- Code View -->
    <div id="view-code" class="view">
        <!-- File Explorer Panel -->
        <div id="file-explorer-panel" class="code-panel active">
            <div class="code-header">
                <span class="code-header-title" id="current-path">~/projects/sample</span>
            </div>
            <div class="file-list" id="file-list">
                <!-- Files will be loaded here -->
            </div>
        </div>

        <!-- Code Viewer Panel -->
        <div id="code-viewer-panel" class="code-panel">
            <div class="code-header">
                <button class="code-back-btn" onclick="showFileExplorer()">Back</button>
                <span class="code-header-title" id="code-filename">filename.js</span>
            </div>
            <div class="code-content">
                <pre><code id="code-content" class="hljs"></code></pre>
            </div>
        </div>
    </div>

    <!-- Git View -->
    <div id="view-git" class="view">
        <div class="git-container">
            <!-- Unstaged Changes Section -->
            <div class="git-section">
                <div class="git-section-header collapsed" data-section="unstaged">
                    <span class="git-section-icon">▶</span>
                    <span class="git-section-title">Unstaged Changes</span>
                    <span class="git-section-count" id="unstaged-count">0</span>
                </div>
                <div class="git-section-content collapsed" id="unstaged-content">
                    <div class="git-loading">Loading changes...</div>
                </div>
            </div>

            <!-- Staged Changes Section -->
            <div class="git-section">
                <div class="git-section-header collapsed" data-section="staged">
                    <span class="git-section-icon">▶</span>
                    <span class="git-section-title">Staged Changes</span>
                    <span class="git-section-count" id="staged-count">0</span>
                </div>
                <div class="git-section-content collapsed" id="staged-content">
                    <div class="git-loading">Loading changes...</div>
                </div>
            </div>

            <!-- Commit Button (Fixed at bottom) -->
            <div class="git-commit-bar">
                <button class="git-commit-btn" id="commit-btn" disabled>Commit</button>
            </div>
        </div>
    </div>

    <!-- Keyboard Toolbar -->
    <div id="keyboard-toolbar">
        <button class="key-btn" data-key="esc">Esc</button>
        <button class="key-btn" data-key="up">↑</button>
        <button class="key-btn" data-key="down">↓</button>
        <button class="key-btn" data-key="left">←</button>
        <button class="key-btn" data-key="right">→</button>
        <button class="key-btn" data-key="enter">Enter</button>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="llm">LLM</button>
        <button class="nav-btn" data-view="code">Code</button>
        <button class="nav-btn" data-view="git">Git</button>
    </nav>

    <!-- xterm.js library -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <!-- Highlight.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configuration - use same host as the page is served from
        const WS_HOST = window.location.hostname || 'localhost';
        const WS_PORT = '8081';

        // Authentication - HARDCODED FOR NOW
        const USERNAME = 'detach-dev';

        const RECONNECT_DELAY = 3000; // 3 seconds

        // Session persistence
        const SESSION_KEY = 'detach_session_id';

        // Code view state
        const PROJECT_ROOT = '~/projects/sample';
        let currentPath = PROJECT_ROOT;
        let codeViewInitialized = false;

        // Code view functions
        function listFiles(path) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'list_files', path: path }));
            }
        }

        function readFile(path) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'read_file', path: path }));
            }
        }

        function renderFileList(files, path) {
            const fileList = document.getElementById('file-list');
            const currentPathEl = document.getElementById('current-path');

            currentPath = path;
            currentPathEl.textContent = path;

            let html = '';

            // Add parent directory link if not at project root
            if (path !== PROJECT_ROOT) {
                const parentPath = path.split('/').slice(0, -1).join('/') || PROJECT_ROOT;
                html += `
                    <div class="file-item" onclick="navigateToFolder('${parentPath}')">
                        <span class="file-icon">📁</span>
                        <span class="file-name">..</span>
                    </div>
                `;
            }

            // Sort: folders first, then files
            const sorted = [...files].sort((a, b) => {
                if (a.is_dir && !b.is_dir) return -1;
                if (!a.is_dir && b.is_dir) return 1;
                return a.name.localeCompare(b.name);
            });

            for (const file of sorted) {
                const icon = file.is_dir ? '📁' : '📄';
                const size = file.is_dir ? '' : formatFileSize(file.size);
                const fullPath = path + '/' + file.name;

                if (file.is_dir) {
                    html += `
                        <div class="file-item" onclick="navigateToFolder('${fullPath}')">
                            <span class="file-icon">${icon}</span>
                            <span class="file-name">${file.name}</span>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="file-item" onclick="openFile('${fullPath}', '${file.name}')">
                            <span class="file-icon">${icon}</span>
                            <span class="file-name">${file.name}</span>
                            <span class="file-size">${size}</span>
                        </div>
                    `;
                }
            }

            fileList.innerHTML = html;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function navigateToFolder(path) {
            listFiles(path);
        }

        function openFile(path, filename) {
            document.getElementById('code-filename').textContent = filename;
            readFile(path);
        }

        function showCodeViewer(content, filename) {
            const codeEl = document.getElementById('code-content');
            codeEl.textContent = content;

            // Auto-detect language and highlight
            delete codeEl.dataset.highlighted;
            hljs.highlightElement(codeEl);

            // Switch panels
            document.getElementById('file-explorer-panel').classList.remove('active');
            document.getElementById('code-viewer-panel').classList.add('active');
        }

        function showFileExplorer() {
            document.getElementById('code-viewer-panel').classList.remove('active');
            document.getElementById('file-explorer-panel').classList.add('active');
        }

        function handleFileMessage(msg) {
            if (msg.type === 'file_list') {
                if (msg.error) {
                    console.error('File list error:', msg.error);
                    return;
                }
                renderFileList(msg.files || [], msg.path);
            } else if (msg.type === 'file_content') {
                if (msg.error) {
                    console.error('File read error:', msg.error);
                    return;
                }
                showCodeViewer(msg.content, msg.path.split('/').pop());
            }
        }

        function getWebSocketURL() {
            const params = new URLSearchParams({ user: USERNAME });
            const sessionId = localStorage.getItem(SESSION_KEY);
            if (sessionId) {
                params.set('session', sessionId);
            }
            return `ws://${WS_HOST}:${WS_PORT}?${params.toString()}`;
        }

        // Status elements
        const statusEl = document.getElementById('status');

        // Initialize xterm.js
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff',
                cursorAccent: '#000000',
                selection: 'rgba(255, 255, 255, 0.3)',
                black: '#000000',
                red: '#e06c75',
                green: '#98c379',
                yellow: '#d19a66',
                blue: '#61afef',
                magenta: '#c678dd',
                cyan: '#56b6c2',
                white: '#abb2bf',
                brightBlack: '#5c6370',
                brightRed: '#e06c75',
                brightGreen: '#98c379',
                brightYellow: '#d19a66',
                brightBlue: '#61afef',
                brightMagenta: '#c678dd',
                brightCyan: '#56b6c2',
                brightWhite: '#ffffff'
            },
            allowTransparency: false,
            scrollback: 10000,
            localEcho: false
        });

        // Fit addon for responsive terminal sizing
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        // Open terminal
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        // WebSocket connection (declared early for use in resize handlers)
        let ws = null;
        let reconnectTimeout = null;

        // Send terminal size to server
        function sendTerminalSize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const resizeMessage = JSON.stringify({
                    type: 'resize',
                    rows: term.rows,
                    cols: term.cols
                });
                ws.send(resizeMessage);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            fitAddon.fit();
            sendTerminalSize();
        });

        // Handle screen orientation change (mobile)
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                fitAddon.fit();
                sendTerminalSize();
            }, 100);
        });

        // Handle mobile keyboard open/close using visualViewport API
        function handleViewportResize() {
            if (window.visualViewport) {
                const viewport = window.visualViewport;
                const statusBarHeight = 32;
                const navBarHeight = 50;

                // Calculate available height for views
                const availableHeight = viewport.height - statusBarHeight - navBarHeight;

                // Resize all views
                document.querySelectorAll('.view').forEach(view => {
                    view.style.height = `${availableHeight}px`;
                    view.style.bottom = 'auto';
                });

                // Move nav bar and keyboard toolbar to stay above keyboard
                const navBar = document.getElementById('bottom-nav');
                const keyboardToolbar = document.getElementById('keyboard-toolbar');
                const offset = window.innerHeight - viewport.height;
                navBar.style.bottom = `${offset}px`;

                // Only move keyboard toolbar if it's visible (LLM view active)
                if (keyboardToolbar.classList.contains('visible')) {
                    keyboardToolbar.style.bottom = `${50 + offset}px`;
                }

                // Re-fit terminal to new dimensions
                fitAddon.fit();
                sendTerminalSize();
            }
        }

        // Set up visualViewport listeners for keyboard detection
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleViewportResize);
            window.visualViewport.addEventListener('scroll', handleViewportResize);
            // Initial setup
            handleViewportResize();
        }

        // Keyboard toolbar functionality
        document.querySelectorAll('.key-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const key = btn.dataset.key;
                let sequence = '';

                switch(key) {
                    case 'up': sequence = '\x1b[A'; break;
                    case 'down': sequence = '\x1b[B'; break;
                    case 'right': sequence = '\x1b[C'; break;
                    case 'left': sequence = '\x1b[D'; break;
                    case 'esc': sequence = '\x1b'; break;
                    case 'enter': sequence = '\r'; break;
                }

                if (ws && ws.readyState === WebSocket.OPEN && sequence) {
                    ws.send(sequence);
                }
            });
        });

        // Initialize keyboard toolbar visibility (LLM view is default)
        document.getElementById('keyboard-toolbar').classList.add('visible');

        // Git View State
        let gitViewInitialized = false;
        let unstagedChanges = [];
        let stagedChanges = [];
        let discardConfirmState = {}; // Track which files are waiting for double-tap confirm

        // Initialize Git view when switching to it
        function initGitView() {
            if (gitViewInitialized) return;
            gitViewInitialized = true;

            // Set up accordion toggle
            document.querySelectorAll('.git-section-header').forEach(header => {
                header.addEventListener('click', () => toggleGitSection(header));
            });

            // Load git status
            loadGitStatus();
        }

        // Toggle accordion section (mutually exclusive)
        function toggleGitSection(header) {
            const section = header.dataset.section;
            const content = document.getElementById(`${section}-content`);
            const isCollapsed = header.classList.contains('collapsed');

            // Collapse all sections first
            document.querySelectorAll('.git-section-header').forEach(h => {
                h.classList.add('collapsed');
                const contentId = `${h.dataset.section}-content`;
                document.getElementById(contentId).classList.add('collapsed');
            });

            // If it was collapsed, expand it. If it was expanded, leave it collapsed.
            if (isCollapsed) {
                header.classList.remove('collapsed');
                content.classList.remove('collapsed');
            }
        }

        // Load git status from bridge
        function loadGitStatus() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            // Send git status command via WebSocket
            ws.send(JSON.stringify({ type: 'git_status' }));
        }

        // Parse git diff output
        function parseDiff(diffText) {
            const lines = diffText.split('\n');
            const result = [];

            for (const line of lines) {
                if (line.startsWith('@@')) {
                    result.push({ type: 'hunk', content: line });
                } else if (line.startsWith('+') && !line.startsWith('+++')) {
                    result.push({ type: 'added', content: line });
                } else if (line.startsWith('-') && !line.startsWith('---')) {
                    result.push({ type: 'removed', content: line });
                } else if (!line.startsWith('diff') && !line.startsWith('index')) {
                    result.push({ type: 'context', content: line });
                }
            }

            return result;
        }

        // HTML escape utility
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render file change item
        function renderFileChange(file, staged = false) {
            const diffLines = parseDiff(file.diff);

            const diffHtml = diffLines.map(line =>
                `<div class="git-diff-line ${line.type}">${escapeHtml(line.content)}</div>`
            ).join('');

            const actionsHtml = staged ?
                `<button class="git-action-btn unstage" data-file="${escapeHtml(file.path)}">Unstage</button>` :
                `<button class="git-action-btn stage" data-file="${escapeHtml(file.path)}">Stage</button>
                 <button class="git-action-btn discard" data-file="${escapeHtml(file.path)}">Discard</button>`;

            return `
                <div class="git-file-item">
                    <div class="git-file-header">
                        <div class="git-file-info">
                            <span class="git-file-name">${escapeHtml(file.path)}</span>
                            <span class="git-file-stats">
                                <span class="added">+${file.added || 0}</span>
                                <span class="removed">-${file.removed || 0}</span>
                            </span>
                        </div>
                        <div class="git-file-actions">
                            ${actionsHtml}
                        </div>
                    </div>
                    <div class="git-diff">${diffHtml}</div>
                </div>
            `;
        }

        // Update unstaged changes display
        function updateUnstagedChanges(files) {
            unstagedChanges = files;
            const container = document.getElementById('unstaged-content');
            const count = document.getElementById('unstaged-count');

            count.textContent = files.length;

            if (files.length === 0) {
                container.innerHTML = '<div class="git-empty">No unstaged changes</div>';
                return;
            }

            container.innerHTML = files.map(f => renderFileChange(f, false)).join('');

            // Attach event listeners
            container.querySelectorAll('.git-action-btn.stage').forEach(btn => {
                btn.addEventListener('click', () => stageFile(btn.dataset.file));
            });

            container.querySelectorAll('.git-action-btn.discard').forEach(btn => {
                btn.addEventListener('click', () => discardFile(btn, btn.dataset.file));
            });
        }

        // Update staged changes display
        function updateStagedChanges(files) {
            stagedChanges = files;
            const container = document.getElementById('staged-content');
            const count = document.getElementById('staged-count');
            const commitBtn = document.getElementById('commit-btn');

            count.textContent = files.length;
            commitBtn.disabled = files.length === 0;

            if (files.length === 0) {
                container.innerHTML = '<div class="git-empty">No staged changes</div>';
                return;
            }

            container.innerHTML = files.map(f => renderFileChange(f, true)).join('');

            // Attach event listeners
            container.querySelectorAll('.git-action-btn.unstage').forEach(btn => {
                btn.addEventListener('click', () => unstageFile(btn.dataset.file));
            });
        }

        // Git actions
        function stageFile(filePath) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'git_stage', file: filePath }));
        }

        function unstageFile(filePath) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'git_unstage', file: filePath }));
        }

        function discardFile(btn, filePath) {
            // Implement double-tap confirmation
            const now = Date.now();
            const lastTap = discardConfirmState[filePath] || 0;

            if (now - lastTap < 2000) { // 2 second window for double tap
                // Confirmed - discard the file
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                ws.send(JSON.stringify({ type: 'git_discard', file: filePath }));
                delete discardConfirmState[filePath];
                btn.classList.remove('confirm');
            } else {
                // First tap - show confirmation state
                discardConfirmState[filePath] = now;
                btn.classList.add('confirm');
                btn.textContent = 'Tap again to confirm';

                // Reset after 2 seconds
                setTimeout(() => {
                    if (discardConfirmState[filePath] === now) {
                        delete discardConfirmState[filePath];
                        btn.classList.remove('confirm');
                        btn.textContent = 'Discard';
                    }
                }, 2000);
            }
        }

        // Handle Git messages from bridge
        function handleGitMessage(msg) {
            if (msg.type === 'git_status') {
                updateUnstagedChanges(msg.unstaged || []);
                updateStagedChanges(msg.staged || []);
            } else if (msg.type === 'git_stage_success' || msg.type === 'git_unstage_success' || msg.type === 'git_discard_success') {
                // Reload git status after action
                loadGitStatus();
            } else if (msg.type === 'git_error') {
                console.error('Git error:', msg.error);
                // TODO: Show error to user
            }
        }

        function updateStatus(status, message) {
            statusEl.className = status;
            statusEl.textContent = message;
        }

        function connect() {
            if (ws) {
                ws.close();
            }

            updateStatus('connecting', 'Connecting to terminal...');

            try {
                const wsUrl = getWebSocketURL();
                const hasExistingSession = localStorage.getItem(SESSION_KEY) !== null;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    const sessionId = localStorage.getItem(SESSION_KEY);
                    if (sessionId) {
                        updateStatus('connected', `Reconnected to session`);
                    } else {
                        updateStatus('connected', `Connected to ${WS_HOST}:${WS_PORT}`);
                        term.clear();
                    }

                    // Send initial terminal size
                    sendTerminalSize();

                    // Auto-hide status after 2 seconds when connected
                    setTimeout(() => {
                        statusEl.style.opacity = '0.7';
                    }, 2000);
                };

                ws.onmessage = (event) => {
                    // Handle text messages (session ID, file ops) vs binary (terminal output)
                    if (typeof event.data === 'string') {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.type === 'session' && msg.id) {
                                console.log('Session ID:', msg.id);
                                localStorage.setItem(SESSION_KEY, msg.id);
                            } else if (msg.type === 'file_list' || msg.type === 'file_content') {
                                handleFileMessage(msg);
                            } else if (msg.type && msg.type.startsWith('git_')) {
                                handleGitMessage(msg);
                            }
                        } catch (e) {
                            // Not JSON, treat as text output
                            term.write(event.data);
                        }
                    } else if (event.data instanceof ArrayBuffer) {
                        const data = new Uint8Array(event.data);
                        term.write(data);
                    } else if (event.data instanceof Blob) {
                        event.data.arrayBuffer().then(buf => {
                            term.write(new Uint8Array(buf));
                        });
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('disconnected', 'Connection error');
                };

                ws.onclose = () => {
                    updateStatus('disconnected', `Disconnected. Reconnecting in ${RECONNECT_DELAY/1000}s...`);
                    statusEl.style.opacity = '1';

                    // Auto-reconnect
                    if (reconnectTimeout) {
                        clearTimeout(reconnectTimeout);
                    }
                    reconnectTimeout = setTimeout(connect, RECONNECT_DELAY);
                };

            } catch (error) {
                console.error('Connection error:', error);
                updateStatus('disconnected', `Failed to connect: ${error.message}`);

                // Retry connection
                if (reconnectTimeout) {
                    clearTimeout(reconnectTimeout);
                }
                reconnectTimeout = setTimeout(connect, RECONNECT_DELAY);
            }
        }

        // Handle terminal input (registered once, uses current ws variable)
        term.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // View switching
        function switchView(viewName) {
            // Hide all views
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Show selected view
            document.getElementById(`view-${viewName}`).classList.add('active');
            document.querySelector(`[data-view="${viewName}"]`).classList.add('active');

            // Toggle keyboard toolbar visibility and adjust terminal height
            const keyboardToolbar = document.getElementById('keyboard-toolbar');
            const terminalContainer = document.getElementById('terminal-container');

            if (viewName === 'llm') {
                keyboardToolbar.classList.add('visible');
                terminalContainer.style.bottom = '94px';
                setTimeout(() => {
                    fitAddon.fit();
                    sendTerminalSize();
                }, 50);
            } else {
                keyboardToolbar.classList.remove('visible');
                terminalContainer.style.bottom = '50px';
            }

            // Load files when switching to Code view
            if (viewName === 'code') {
                if (!codeViewInitialized && ws && ws.readyState === WebSocket.OPEN) {
                    codeViewInitialized = true;
                    listFiles(PROJECT_ROOT);
                }
            }

            // Initialize Git view when switching to it
            if (viewName === 'git') {
                initGitView();
            }
        }

        // Nav button click handlers
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });

        // Start connection
        connect();

        // Handle page visibility (reconnect when coming back to the page)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && ws && ws.readyState !== WebSocket.OPEN) {
                connect();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
            }
        });
    </script>
</body>
</html>
