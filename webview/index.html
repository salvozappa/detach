<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detach.it Terminal</title>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #status {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px 16px;
            font-size: 12px;
            text-align: center;
            z-index: 1000;
            transition: background-color 0.3s;
        }

        #status.connecting {
            background-color: #ff9800;
            color: #000;
        }

        #status.connected {
            background-color: #4caf50;
            color: #000;
        }

        #status.disconnected {
            background-color: #f44336;
            color: #fff;
        }

        #terminal-container {
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 8px;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        .xterm {
            height: 100%;
            padding: 8px;
        }

        .xterm-viewport {
            overflow-y: auto;
            background-color: #000;
        }

        /* Views */
        .view {
            display: none;
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 50px;
            overflow: hidden;
        }

        .view.active {
            display: block;
        }

        /* Placeholder view styling */
        .placeholder-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 16px;
            color: #888;
        }

        .placeholder-view h2 {
            color: #fff;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .placeholder-section {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #1a1a1a;
            display: flex;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:active {
            background: #222;
        }

        .nav-btn.active {
            color: #fff;
            background: #333;
        }
    </style>
</head>
<body>
    <div id="status" class="connecting">Connecting...</div>

    <!-- LLM View (Terminal) -->
    <div id="view-llm" class="view active">
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- Code View (Placeholder) -->
    <div id="view-code" class="view">
        <div class="placeholder-view">
            <h2>Code View</h2>
            <div class="placeholder-section">
                File Explorer
            </div>
            <div class="placeholder-section">
                Code Diff Viewer
            </div>
        </div>
    </div>

    <!-- Git View (Placeholder) -->
    <div id="view-git" class="view">
        <div class="placeholder-view">
            <h2>Git View</h2>
            <div class="placeholder-section">
                Staged Changes
            </div>
            <div class="placeholder-section">
                Commit Message
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="llm">LLM</button>
        <button class="nav-btn" data-view="code">Code</button>
        <button class="nav-btn" data-view="git">Git</button>
    </nav>

    <!-- xterm.js library -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        // Configuration - use same host as the page is served from
        const WS_HOST = window.location.hostname || 'localhost';
        const WS_PORT = '8081';

        // Authentication - HARDCODED FOR NOW
        const USERNAME = 'detach-dev';

        const RECONNECT_DELAY = 3000; // 3 seconds

        // Session persistence
        const SESSION_KEY = 'detach_session_id';

        function getWebSocketURL() {
            const params = new URLSearchParams({ user: USERNAME });
            const sessionId = localStorage.getItem(SESSION_KEY);
            if (sessionId) {
                params.set('session', sessionId);
            }
            return `ws://${WS_HOST}:${WS_PORT}?${params.toString()}`;
        }

        // Status elements
        const statusEl = document.getElementById('status');

        // Initialize xterm.js
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff',
                cursorAccent: '#000000',
                selection: 'rgba(255, 255, 255, 0.3)',
                black: '#000000',
                red: '#e06c75',
                green: '#98c379',
                yellow: '#d19a66',
                blue: '#61afef',
                magenta: '#c678dd',
                cyan: '#56b6c2',
                white: '#abb2bf',
                brightBlack: '#5c6370',
                brightRed: '#e06c75',
                brightGreen: '#98c379',
                brightYellow: '#d19a66',
                brightBlue: '#61afef',
                brightMagenta: '#c678dd',
                brightCyan: '#56b6c2',
                brightWhite: '#ffffff'
            },
            allowTransparency: false,
            scrollback: 10000,
            localEcho: false
        });

        // Fit addon for responsive terminal sizing
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        // Open terminal
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        // WebSocket connection (declared early for use in resize handlers)
        let ws = null;
        let reconnectTimeout = null;

        // Send terminal size to server
        function sendTerminalSize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const resizeMessage = JSON.stringify({
                    type: 'resize',
                    rows: term.rows,
                    cols: term.cols
                });
                ws.send(resizeMessage);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            fitAddon.fit();
            sendTerminalSize();
        });

        // Handle screen orientation change (mobile)
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                fitAddon.fit();
                sendTerminalSize();
            }, 100);
        });

        // Handle mobile keyboard open/close using visualViewport API
        function handleViewportResize() {
            if (window.visualViewport) {
                const viewport = window.visualViewport;
                const statusBarHeight = 32;
                const navBarHeight = 50;

                // Calculate available height for views
                const availableHeight = viewport.height - statusBarHeight - navBarHeight;

                // Resize all views
                document.querySelectorAll('.view').forEach(view => {
                    view.style.height = `${availableHeight}px`;
                    view.style.bottom = 'auto';
                });

                // Move nav bar to stay above keyboard
                const navBar = document.getElementById('bottom-nav');
                navBar.style.bottom = `${window.innerHeight - viewport.height}px`;

                // Re-fit terminal to new dimensions
                fitAddon.fit();
                sendTerminalSize();
            }
        }

        // Set up visualViewport listeners for keyboard detection
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleViewportResize);
            window.visualViewport.addEventListener('scroll', handleViewportResize);
            // Initial setup
            handleViewportResize();
        }

        function updateStatus(status, message) {
            statusEl.className = status;
            statusEl.textContent = message;
        }

        function connect() {
            if (ws) {
                ws.close();
            }

            updateStatus('connecting', 'Connecting to terminal...');

            try {
                const wsUrl = getWebSocketURL();
                const hasExistingSession = localStorage.getItem(SESSION_KEY) !== null;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    const sessionId = localStorage.getItem(SESSION_KEY);
                    if (sessionId) {
                        updateStatus('connected', `Reconnected to session`);
                    } else {
                        updateStatus('connected', `Connected to ${WS_HOST}:${WS_PORT}`);
                        term.clear();
                    }

                    // Send initial terminal size
                    sendTerminalSize();

                    // Auto-hide status after 2 seconds when connected
                    setTimeout(() => {
                        statusEl.style.opacity = '0.7';
                    }, 2000);
                };

                ws.onmessage = (event) => {
                    // Handle text messages (session ID) vs binary (terminal output)
                    if (typeof event.data === 'string') {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.type === 'session' && msg.id) {
                                console.log('Session ID:', msg.id);
                                localStorage.setItem(SESSION_KEY, msg.id);
                            }
                        } catch (e) {
                            // Not JSON, treat as text output
                            term.write(event.data);
                        }
                    } else if (event.data instanceof ArrayBuffer) {
                        const data = new Uint8Array(event.data);
                        term.write(data);
                    } else if (event.data instanceof Blob) {
                        event.data.arrayBuffer().then(buf => {
                            term.write(new Uint8Array(buf));
                        });
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('disconnected', 'Connection error');
                };

                ws.onclose = () => {
                    updateStatus('disconnected', `Disconnected. Reconnecting in ${RECONNECT_DELAY/1000}s...`);
                    statusEl.style.opacity = '1';

                    // Auto-reconnect
                    if (reconnectTimeout) {
                        clearTimeout(reconnectTimeout);
                    }
                    reconnectTimeout = setTimeout(connect, RECONNECT_DELAY);
                };

            } catch (error) {
                console.error('Connection error:', error);
                updateStatus('disconnected', `Failed to connect: ${error.message}`);

                // Retry connection
                if (reconnectTimeout) {
                    clearTimeout(reconnectTimeout);
                }
                reconnectTimeout = setTimeout(connect, RECONNECT_DELAY);
            }
        }

        // Handle terminal input (registered once, uses current ws variable)
        term.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // View switching
        function switchView(viewName) {
            // Hide all views
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Show selected view
            document.getElementById(`view-${viewName}`).classList.add('active');
            document.querySelector(`[data-view="${viewName}"]`).classList.add('active');

            // Re-fit terminal if switching to LLM view
            if (viewName === 'llm') {
                setTimeout(() => {
                    fitAddon.fit();
                    sendTerminalSize();
                }, 50);
            }
        }

        // Nav button click handlers
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });

        // Start connection
        connect();

        // Handle page visibility (reconnect when coming back to the page)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && ws && ws.readyState !== WebSocket.OPEN) {
                connect();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
            }
        });
    </script>
</body>
</html>
