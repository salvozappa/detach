<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>Detach.it</title>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="lib/xterm.css" />

    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="lib/highlight.min.css" />

    <!-- diff2html CSS -->
    <link rel="stylesheet" href="lib/diff2html.min.css" />

    <!-- Application CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="status" class="connecting">Connecting...</div>

    <!-- LLM View (Terminal) -->
    <div id="view-llm" class="view active">
        <div id="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- Code View -->
    <div id="view-code" class="view">
        <!-- File Explorer Panel -->
        <div id="file-explorer-panel" class="code-panel active">
            <div class="code-header">
                <span class="code-header-title" id="current-path">~/projects/notestash</span>
            </div>
            <div class="file-list" id="file-list">
                <!-- Files will be loaded here -->
            </div>
        </div>

        <!-- Code Viewer Panel -->
        <div id="code-viewer-panel" class="code-panel">
            <div class="code-header">
                <button class="code-back-btn" onclick="showFileExplorer()">Back</button>
                <span class="code-header-title" id="code-filename">filename.js</span>
                <button class="code-select-toggle" id="code-select-toggle" onclick="toggleSelectMode()">Select</button>
            </div>
            <!-- Normal code view (syntax highlighted) -->
            <div class="code-content" id="code-content-normal">
                <pre><code id="code-content" class="hljs"></code></pre>
            </div>
            <!-- Diff view (diff2html) -->
            <div class="code-content" id="code-content-diff" style="display: none;"></div>
            <!-- Floating button for sending selection to LLM -->
            <button id="send-to-llm-btn" class="send-to-llm-btn">Reference to LLM</button>
        </div>
    </div>

    <!-- Git View -->
    <div id="view-git" class="view">
        <!-- Git Main Panel -->
        <div id="git-main-panel" class="code-panel active">
            <div class="git-container">
                <!-- Unstaged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header" data-section="unstaged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Unstaged Changes</span>
                        <span class="git-section-count" id="unstaged-count">0</span>
                    </div>
                    <div class="git-section-content" id="unstaged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Staged Changes Section -->
                <div class="git-section">
                    <div class="git-section-header collapsed" data-section="staged">
                        <span class="git-section-icon">▶</span>
                        <span class="git-section-title">Staged Changes</span>
                        <span class="git-section-count" id="staged-count">0</span>
                    </div>
                    <div class="git-section-content collapsed" id="staged-content">
                        <div class="git-loading">Loading changes...</div>
                    </div>
                </div>

                <!-- Commit Button with Message Input (Fixed at bottom) -->
                <div class="git-commit-bar">
                    <textarea id="commit-message"
                              class="commit-input"
                              placeholder="Commit message..."
                              rows="1"></textarea>
                    <button class="git-commit-btn" id="commit-btn" disabled>Commit</button>

                    <!-- Pull/Push Buttons Row -->
                    <div class="git-sync-buttons">
                        <button class="git-sync-btn" id="pull-btn">Pull</button>
                        <button class="git-sync-btn" id="push-btn">Push</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal View -->
    <div id="view-terminal" class="view">
        <div id="terminal-shell-container">
            <div id="terminal-shell"></div>
        </div>
    </div>

    <!-- Keyboard Toolbar -->
    <div id="keyboard-toolbar">
        <div class="keyboard-row">
            <button class="key-btn" data-key="tab">Tab</button>
            <button class="key-btn" data-key="mode">Mode</button>
            <button class="key-btn" data-action="pgup">PgUp</button>
            <button class="key-btn" data-action="pgdn">PgDn</button>
            <button class="key-btn" data-action="scroll-to-bottom">Scroll ↓</button>
        </div>
        <div class="keyboard-row">
            <button class="key-btn" data-key="esc">Esc</button>
            <button class="key-btn" data-key="ctrl-c">Ctrl+C</button>
            <button class="key-btn arrow-btn" data-key="left">←</button>
            <button class="key-btn arrow-btn" data-key="right">→</button>
            <button class="key-btn arrow-btn" data-key="up">↑</button>
            <button class="key-btn arrow-btn" data-key="down">↓</button>
            <button class="key-btn" data-key="enter">Enter</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="llm">LLM</button>
        <button class="nav-btn" data-view="code">Code</button>
        <button class="nav-btn" data-view="terminal">Terminal</button>
        <button class="nav-btn" data-view="git">Git</button>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- xterm.js library -->
    <script src="lib/xterm.js"></script>
    <script src="lib/xterm-addon-fit.js"></script>

    <!-- Highlight.js library -->
    <script src="lib/highlight.min.js"></script>

    <!-- diff2html library -->
    <script src="lib/diff2html-ui.min.js"></script>

    <!-- Application JavaScript -->
    <script src="app.js"></script>
</body>
</html>
