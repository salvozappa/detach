services:
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: detach-sandbox
    hostname: sandbox
    networks:
      - detach-network
    ports:
      - "2222:22"  # SSH accessible from host for debugging
    volumes:
      - ./keys/bridge.pub:/tmp/authorized_keys:ro
      - ./keys/detach_dev:/home/detach-dev/.ssh/id_ed25519:ro
      - ./keys/detach_dev.pub:/home/detach-dev/.ssh/id_ed25519.pub:ro
      - sandbox-home:/home/detach-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 3

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: detach-bridge
    networks:
      - detach-network
    ports:
      - "8081:8081"
    environment:
      - SANDBOX_HOST=sandbox
      - SANDBOX_PORT=22
      - SSH_KEY_PATH=/app/keys/bridge
    volumes:
      - ./keys/bridge:/app/keys/bridge:ro
    depends_on:
      sandbox:
        condition: service_healthy
    restart: unless-stopped

  webview:
    build:
      context: ./webview
      dockerfile: Dockerfile
    container_name: detach-webview
    networks:
      - detach-network
    ports:
      - "8080:80"
    volumes:
      - ./webview/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./webview/index.html:/usr/share/nginx/html/index.html:ro
      - ./webview/app.js:/usr/share/nginx/html/app.js:ro
      - ./webview/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./webview/lib:/usr/share/nginx/html/lib:ro
    depends_on:
      - bridge
    restart: unless-stopped

networks:
  detach-network:
    driver: bridge

volumes:
  sandbox-home:
    driver: local
