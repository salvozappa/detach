services:
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: detach-sandbox
    hostname: sandbox
    networks:
      - detach-network
    ports:
      - "2222:22"  # SSH accessible from host for debugging
    environment:
      - REPO_URL=${REPO_URL:-}
      - GIT_NAME=${GIT_NAME:-}
      - GIT_EMAIL=${GIT_EMAIL:-}
    volumes:
      - ./keys/bridge.pub:/tmp/authorized_keys:ro
      - ./keys/deploy_key:/home/detach-dev/.ssh/id_ed25519:ro
      - ./keys/deploy_key.pub:/home/detach-dev/.ssh/id_ed25519.pub:ro
      - sandbox-home:/home/detach-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 3

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: detach-bridge
    networks:
      - detach-network
    ports:
      - "8081:8081"
    environment:
      - SANDBOX_HOST=sandbox
      - SANDBOX_PORT=22
      - SSH_KEY_PATH=/app/keys/bridge
      - CLAUDE_ARGS=${CLAUDE_ARGS:---dangerously-skip-permissions}
      - DETACH_TOKEN=${DETACH_TOKEN:-}
      - WEBVIEW_HOST=${WEBVIEW_HOST:-localhost:8080}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@detach.it}
      - WEB_PUSH_SUBSCRIPTIONS_FILE=/app/data/web-push-subscriptions.json
      - SKIP_AUTHENTICATION=${SKIP_AUTHENTICATION:-}
    volumes:
      - ./keys/bridge:/app/keys/bridge:ro
      - bridge-data:/app/data
    depends_on:
      sandbox:
        condition: service_healthy
    restart: unless-stopped

  webview:
    build:
      context: ./webview
      dockerfile: Dockerfile
    container_name: detach-webview
    networks:
      - detach-network
    ports:
      - "8080:80"
    depends_on:
      - bridge
    restart: unless-stopped

networks:
  detach-network:
    driver: bridge

volumes:
  sandbox-home:
    driver: local
  bridge-data:
    driver: local
